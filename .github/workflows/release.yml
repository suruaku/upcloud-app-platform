name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/go-ci-reusable.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.x'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME=upcloud-app-platform
          if [ "$GOOS" = "windows" ]; then BIN_NAME=upcloud-app-platform.exe; fi
          go build -trimpath -ldflags "-s -w -X github.com/suruaku/upcloud-app-platform/cmd.appVersion=${GITHUB_REF_NAME}" -o "dist/${BIN_NAME}" .

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OS="${{ matrix.goos }}"
          ARCH="${{ matrix.goarch }}"
          EXT="${{ matrix.ext }}"
          ARTIFACT="upcloud-app-platform_${VERSION}_${OS}_${ARCH}"
          mkdir -p release
          if [ "$OS" = "windows" ]; then
            cd dist
            zip "../release/${ARTIFACT}.zip" upcloud-app-platform.exe
          else
            tar -C dist -czf "release/${ARTIFACT}.tar.gz" upcloud-app-platform
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find release-artifacts -type f -maxdepth 3 -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --repo "${GITHUB_REPOSITORY}"

  update_tap:
    needs: publish
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
